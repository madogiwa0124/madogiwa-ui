name: ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.css"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: lint typecheck
        run: pnpm run lint:type-check
      - name: cache lint js
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: node_modules/.cache/eslint
          key: lint-js-v1-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            lint-js-v1-
      - name: lint js
        run: pnpm run lint --cache-strategy content --cache-location node_modules/.cache/eslint/
      - name: lint css
        run: pnpm run lint:css

  css:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright Browsers
        uses: ./.github/actions/cache-playwright
        id: playwright-cache
        with:
          working-directory: .
      - name: Setup project
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm run setup
      - name: Build storybook for css
        run: pnpm run css storybook:build
      - name: Serve Storybook and run tests for css
        run: |
          pnpm dlx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "pnpm run css storybook:preview --port 6006 --silent" \
            "pnpm dlx wait-on tcp:127.0.0.1:6006 && pnpm run css storybook:test"
      - name: Unit tests for css
        run: pnpm css test
      - name: Build for css
        run: pnpm css build

  vue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright Browsers
        uses: ./.github/actions/cache-playwright
        id: playwright-cache
        with:
          working-directory: .
      - name: Setup project
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm run setup
      - name: Unit tests for vue
        run: pnpm vue test
      - name: Build for vue
        run: pnpm vue build
