name: ci

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.ts"
      - "**/*.css"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: lint typecheck
        run: pnpm run lint:type-check
      - name: cache lint js
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: node_modules/.cache/eslint
          key: lint-js-v1-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            lint-js-v1-
      - name: lint js
        run: pnpm run lint --cache-strategy content --cache-location node_modules/.cache/eslint/
      - name: lint css
        run: pnpm run lint:css

  css:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright Browsers
        uses: ./.github/actions/cache-playwright
        id: playwright-cache
        with:
          working-directory: .
      - name: Setup project
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm run setup
      - name: Build storybook for css
        run: pnpm run css storybook:build
      - name: Serve Storybook and run tests for css
        run: |
          pnpm dlx concurrently -k -s first -n "SB,TEST" -c "magenta,blue" \
            "pnpm run css storybook:preview --port 6006 --silent" \
            "pnpm dlx wait-on tcp:127.0.0.1:6006 && pnpm run css storybook:test"
      - name: Unit tests for css
        run: pnpm css test
      - name: Build for css
        run: pnpm css build

  vue:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright Browsers
        uses: ./.github/actions/cache-playwright
        id: playwright-cache
        with:
          working-directory: .
      - name: Setup project
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm run setup
      - name: Unit tests for vue
        run: pnpm vue test
      - name: Build for vue
        run: pnpm vue build
